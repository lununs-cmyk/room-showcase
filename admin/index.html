<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="dark"><title>방 관리</title><link rel="stylesheet" href="/admin/admin.css"></head><body><main class="shell"><header><div><small>ROOM SHOWCASE</small><h1>방 관리</h1><p>채팅, 카메라, SNS 피드형 방을 생성합니다.</p></div><button id="lock" class="ghost" hidden>잠금</button></header><section id="login" class="panel login"><h2>관리자 인증</h2><form id="loginForm"><label>관리자 비밀번호<input id="password" type="password" required></label><button>열기</button></form><p id="loginError" class="error" hidden></p></section><div id="dashboard" hidden><section class="panel"><h2>새 방</h2><form id="createForm" class="grid" enctype="multipart/form-data"><label>형식<select name="roomType" id="roomType"><option value="chat">제한 채팅형</option><option value="camera">카메라 셔터형</option><option value="feed">SNS 피드형</option></select></label><label>방 코드<div class="code-row"><input id="roomCode" name="id" readonly><button id="regenerateCode" type="button" class="ghost">새 코드</button></div></label><label>제목<input name="title" maxlength="80" required></label><div id="chatFields" class="subgrid"><label>이미지 게시자<input name="publisherName" value="이미지 게시자"></label><label>게시판 주인<input name="ownerName" value="게시판 주인"></label><label>메시지 제한<input name="messageLimit" type="number" min="1" max="1000" value="30"></label></div><div id="feedFields" class="subgrid" hidden><label>표시 이름<input name="displayName" value="오늘의 기록"></label><label>아이디<input name="userId" value="@daily_moment"></label><label>좋아요 수<input name="likeCount" type="number" min="0" value="0"></label><label class="wide">본문<textarea name="caption" maxlength="500"></textarea></label></div><label class="wide">이미지 최대 5장<input id="images" name="images" type="file" accept="image/jpeg,image/png,image/webp,image/gif" multiple><em>장당 최대 25MB · 선택 순서대로 표시</em></label><div id="preview" class="preview wide"></div><div class="wide"><button id="createButton">방 생성</button></div></form><div id="created" class="created" hidden><input id="createdUrl" readonly><button type="button" id="copyCreated">주소 복사</button><a id="openCreated" target="_blank" rel="noopener">열기</a><textarea id="iframeCode" readonly></textarea><button type="button" id="copyIframe">iframe 복사</button></div></section><section class="panel"><div class="heading"><div><h2>방 목록</h2><p id="count"></p></div><button id="refresh" class="ghost">새로고침</button></div><div id="rooms" class="rooms"></div></section></div></main><template id="roomTpl"><article class="room"><div class="main"><div class="titleline"><div><h3></h3><code></code></div><span class="badge"></span></div><div class="stats"></div><div class="copyrow"><input class="url" readonly><button class="copy ghost">복사</button><a class="open" target="_blank">열기</a></div></div><div class="controls"><label>제한<input class="limit" type="number" min="1" max="1000"></label><button class="update">변경</button><button class="reset warn">초기화</button><button class="delete danger">삭제</button></div></article></template><div id="toast" class="toast" hidden></div><script src="/admin/admin.js" defer></script></body></html>
